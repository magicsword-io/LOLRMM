name: Deploy site

on:
  push:
    branches:
      - main

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        token: ${{ secrets.PUSH_TOKEN }}
    - name: Set up Python 3.12
      uses: actions/setup-python@v5.2.0
      with:
        python-version: 3.12
    - name: Install Poetry
      run: curl -sSL https://install.python-poetry.org | python -
    - name: Install dependencies with Poetry
      run: poetry install
    - name: Generate MDX
      run: poetry run python bin/site.py -v

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
        cache-dependency-path: website/package-lock.json
    - name: Export site
      run: |
        for attempt in 1 2 3; do
          npm install --no-audit --no-fund --fetch-retries=5 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000 && break
          echo "npm install failed (attempt $attempt/3), retrying in 15s..."
          sleep 15
        done
        npm run build
      working-directory: website

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./website/out

    - name: Commit and push changes
      env:
        GITHUB_TOKEN: ${{ secrets.PUSH_TOKEN }}
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git config --global push.default simple
        git add detections/ website/pages/tools/ website/public/
        git diff --quiet && git diff --staged --quiet && exit 0
        git commit -m "Update generated site files [skip ci]"
        for attempt in 1 2 3; do
          if git pull --rebase origin main \
            && git push "https://x-access-token:${GITHUB_TOKEN}@github.com/magicsword-io/LOLRMM.git" HEAD:main; then
            exit 0
          fi
          echo "push attempt $attempt failed, retrying in $((attempt * 5))s..."
          sleep $((attempt * 5))
        done
        exit 1

# Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
