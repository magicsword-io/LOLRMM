title: Potential Net Monitor for Employees RMM Tool Process Activity
id: b53d9277-c822-53fa-8820-380b3c16de0b
status: experimental
description: |
    Detects potential processes activity of Net Monitor for Employees RMM tool
references:
    - https://github.com/magicsword-io/LOLRMM
author: LOLRMM Project
date: 2026-05-18
tags:
    - attack.execution
    - attack.t1219
logsource:
    product: windows
    category: process_creation
detection:
    selection_parent:
        ParentImage|endswith:
            - 'nmep_agtconfig.exe'
            - 'nmep_ctrlagent.exe'
            - 'nmep_ctrlagentsvc.exe'
            - 'winpty-agent.exe'
            - 'winpty-agent64.exe'
    selection_image:
        Image|endswith:
            - 'nmep_agtconfig.exe'
            - 'nmep_ctrlagent.exe'
            - 'nmep_ctrlagentsvc.exe'
            - 'winpty-agent.exe'
            - 'winpty-agent64.exe'
    condition: 1 of selection_*
falsepositives:
    - Legitimate use of Net Monitor for Employees
level: medium
