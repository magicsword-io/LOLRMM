title: Potential Nezha RMM Tool Registry Activity
id: c5284e0b-ccdd-5d68-94a8-189eaae96908
status: experimental
description: |
    Detects potential registry activity of Nezha RMM tool
references:
    - https://github.com/magicsword-io/LOLRMM
author: LOLRMM Project
date: 2026-05-18
tags:
    - attack.execution
    - attack.t1219
logsource:
    product: windows
    category: registry_event
detection:
    selection:
        TargetObject|contains: 'HKLM\SYSTEM\CurrentControlSet\Services\nezha-agent'
    condition: selection
falsepositives:
    - Legitimate use of Nezha
level: medium
