title: Potential Faronics Deep Freeze RMM Tool Network Activity
id: 609bd342-8772-59a6-aa39-e7be6cac0763
status: experimental
description: |
    Detects potential network activity of Faronics Deep Freeze RMM tool
references:
    - https://github.com/magicsword-io/LOLRMM
author: LOLRMM Project
date: 2026-05-18
tags:
    - attack.execution
    - attack.t1219
logsource:
    product: windows
    category: network_connection
detection:
    selection:
        DestinationHostname|endswith:
            - 'deepfreeze.com'
            - 'www.deepfreeze.com'
            - 'faronicscloud.com'
            - 'cloud.faronics.com'
            - 'upd.faronicslabs.com'
            - 'faronics.com'
            - 'www.faronics.com'
    condition: selection
falsepositives:
    - Legitimate use of Faronics Deep Freeze
level: medium
