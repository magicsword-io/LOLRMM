title: Potential InvGate RMM Tool Process Activity
id: 991c68a9-0a24-5b7f-87bd-1934158c1ca5
status: experimental
description: |
    Detects potential processes activity of InvGate RMM tool
references:
    - https://github.com/magicsword-io/LOLRMM
author: LOLRMM Project
date: 2026-05-18
tags:
    - attack.execution
    - attack.t1219
logsource:
    product: windows
    category: process_creation
detection:
    selection_parent:
        ParentImage|endswith:
            - 'InvGate-ED.exe'
            - 'DepHlp.exe'
            - 'InvGateAssetsRD.exe'
            - 'InvGateRD.exe'
    selection_image:
        Image|endswith:
            - 'InvGate-ED.exe'
            - 'DepHlp.exe'
            - 'InvGateAssetsRD.exe'
            - 'InvGateRD.exe'
    condition: 1 of selection_*
falsepositives:
    - Legitimate use of InvGate
level: medium
