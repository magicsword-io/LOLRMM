title: Potential Faronics Insight RMM Tool Network Activity
id: 20f936fa-bbd5-5d5f-adc5-1df7d6342ea0
status: experimental
description: |
    Detects potential network activity of Faronics Insight RMM tool
references:
    - https://github.com/magicsword-io/LOLRMM
author: LOLRMM Project
date: 2026-05-18
tags:
    - attack.execution
    - attack.t1219
logsource:
    product: windows
    category: network_connection
detection:
    selection:
        DestinationHostname|endswith:
            - 'faronics.com'
            - 'www.faronics.com'
            - 'support.faronics.com'
            - 'docs.faronics.com'
            - 'user_managed'
    condition: selection
falsepositives:
    - Legitimate use of Faronics Insight
level: medium
