title: Potential Freshservice RMM Tool Process Activity
id: 4992eedc-3a1c-52df-9de8-ed06cef332c9
status: experimental
description: |
    Detects potential processes activity of Freshservice RMM tool
references:
    - https://github.com/magicsword-io/LOLRMM
author: LOLRMM Project
date: 2026-05-18
tags:
    - attack.execution
    - attack.t1219
logsource:
    product: windows
    category: process_creation
detection:
    selection_parent:
        ParentImage|endswith:
            - 'Freshservice.DiscoveryProbe.ScanService.exe'
            - 'Freshservice.DiscoveryProbe.Window.exe'
            - 'plink.exe'
            - 'FSAgentService.exe'
            - 'FSAgentAutoUpdate.exe'
            - 'FSAgentService.exe'
            - 'FSAgentAutoUpdate.exe'
            - 'FSWmiScanner.exe'
            - 'Freshservice.DiscoveryProbe.Window.exe'
            - 'Freshservice.DiscoveryProbe.ScanService.exe'
    selection_image:
        Image|endswith:
            - 'Freshservice.DiscoveryProbe.ScanService.exe'
            - 'Freshservice.DiscoveryProbe.Window.exe'
            - 'plink.exe'
            - 'FSAgentService.exe'
            - 'FSAgentAutoUpdate.exe'
            - 'FSAgentService.exe'
            - 'FSAgentAutoUpdate.exe'
            - 'FSWmiScanner.exe'
            - 'Freshservice.DiscoveryProbe.Window.exe'
            - 'Freshservice.DiscoveryProbe.ScanService.exe'
    condition: 1 of selection_*
falsepositives:
    - Legitimate use of Freshservice
level: medium
