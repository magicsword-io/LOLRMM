Name: OpenEDR
Category: RMM
Description: 'OpenEDR is an open source endpoint detection and response platform that provides analytic detection with Mitre ATT&CK visibility for event correlation and root cause analysis of adversarial cyber threat activity and behaviors in real time. This endpoint telemetry platform is a continuous monitoring solution available to all cybersecurity professionals, and every sized organization, to use for defending their organization or business against threat actors and cyber criminals.'
Author: saltmyhash0x00
Created: '2026-03-23'
LastModified: '2026-03-23'
Details:
    Website: https://www.openedr.com/
    PEMetadata:
      - Filename: ITSMService.exe
        OriginalFileName: ''
        Description: 'Primary OpenEDR Windows binary'
        Product: OpenEDR
      - Filename: Xcitium Client - Security.app
        OriginalFileName: ''
        Description: 'Primary OpenEDR macOS binary'
    Privileges: user
    Free: true
    Verification: true
    SupportedOS:
        - Mac
        - Windows
    Capabilities:
        - File explorer and file management
        - Interactive command execution
        - Service management
        - Process explorer
        - Event log viewing
        - Reporting and analytics
        - Remote monitoring
        - Clipboard synchronization
        - Connection/fleet management
        - Detection and response
    InstallationPaths:
        - /Applications/Xcitium Client - Security.app
          Description: 'Xcitium Client'
          OS: macOS
        - /Applications/Endpoint Manager Communication Client.app
          Description: 'Endpoint Manager Client'
          OS: macOS
        - C:\Program Files (x86)\COMODO\Endpoint Manager\ITSMService.exe
          Description: 'Endpoint Manager Client'
          OS: Windows
