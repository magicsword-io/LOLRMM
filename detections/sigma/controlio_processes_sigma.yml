title: Potential Controlio RMM Tool Process Activity
id: 04ef9824-7467-570b-a519-eb537b7ae102
status: experimental
description: |
    Detects potential processes activity of Controlio RMM tool
references:
    - https://github.com/magicsword-io/LOLRMM
author: LOLRMM Project
date: 2026-05-18
tags:
    - attack.execution
    - attack.t1219
logsource:
    product: windows
    category: process_creation
detection:
    selection_parent:
        ParentImage|endswith:
            - 'weCliboardListener.exe'
            - 'bbl.exe'
            - 'weprtct.exe'
            - 'wemonc.exe'
            - 'wesvc.exe'
            - 'wec_launcher_[a-Z0-9]*_.exe'
            - 'weInstSvc.exe'
    selection_image:
        Image|endswith:
            - 'weCliboardListener.exe'
            - 'bbl.exe'
            - 'weprtct.exe'
            - 'wemonc.exe'
            - 'wesvc.exe'
            - 'wec_launcher_[a-Z0-9]*_.exe'
            - 'weInstSvc.exe'
    condition: 1 of selection_*
falsepositives:
    - Legitimate use of Controlio
level: medium
