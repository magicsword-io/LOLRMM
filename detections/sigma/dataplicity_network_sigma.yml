title: Potential Dataplicity RMM Tool Network Activity
id: e2dc3562-ae7a-568e-abc9-1b3390d4d66f
status: experimental
description: |
    Detects potential network activity of Dataplicity RMM tool
references:
    - https://github.com/magicsword-io/LOLRMM
author: LOLRMM Project
date: 2026-05-18
tags:
    - attack.execution
    - attack.t1219
logsource:
    product: windows
    category: network_connection
detection:
    selection:
        DestinationHostname|endswith:
            - 'dataplicity.com'
            - 'www.dataplicity.com'
            - '*.dataplicity.com'
            - '*.wormhole.dataplicity.com'
    condition: selection
falsepositives:
    - Legitimate use of Dataplicity
level: medium
