title: Potential Faronics Deep Freeze RMM Tool Process Activity
id: ebed0b7c-1b8d-5589-a36d-177427ca8344
status: experimental
description: |
    Detects potential processes activity of Faronics Deep Freeze RMM tool
references:
    - https://github.com/magicsword-io/LOLRMM
author: LOLRMM Project
date: 2026-05-18
tags:
    - attack.execution
    - attack.t1219
logsource:
    product: windows
    category: process_creation
detection:
    selection_parent:
        ParentImage|endswith:
            - 'DFServ.exe'
            - 'DFServEx.exe'
            - 'DFWks.exe'
            - 'DFC.exe'
            - 'DFServ.exe'
            - 'DFServEx.exe'
            - 'DFWks.exe'
            - 'DFStd.exe'
            - 'DFStdInstall.exe'
            - 'DFC.exe'
            - 'CloudWksInstall.exe'
            - 'DFInst.exe'
    selection_image:
        Image|endswith:
            - 'DFServ.exe'
            - 'DFServEx.exe'
            - 'DFWks.exe'
            - 'DFC.exe'
            - 'DFServ.exe'
            - 'DFServEx.exe'
            - 'DFWks.exe'
            - 'DFStd.exe'
            - 'DFStdInstall.exe'
            - 'DFC.exe'
            - 'CloudWksInstall.exe'
            - 'DFInst.exe'
    condition: 1 of selection_*
falsepositives:
    - Legitimate use of Faronics Deep Freeze
level: medium
