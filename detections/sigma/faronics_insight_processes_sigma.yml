        Image|endswith:
            - 'STAHelper.exe'
            - 'STAHelper.exe'
            - 'FIStudentSvc.exe'
            - 'FIStudentAgent.exe'
            - 'FIStudentUI.exe'
            - 'FIStudentAgent.exe'
            - 'FIStudentSvc.exe'
            - 'FIStudentUI.exe'
            - 'STAHelper.exe'
            - 'StudentSvc.exe'
            - 'InsightInstaller.exe'
            - 'InsightInstallerStudent.exe'
