            - 'FIStudentAgent.exe'
            - 'FIStudentSvc.exe'
            - 'FIStudentUI.exe'
            - 'STAHelper.exe'
            - 'StudentSvc.exe'
            - 'InsightInstaller.exe'
            - 'InsightInstallerStudent.exe'
            - 'InsightInstallerTeacher.exe'
