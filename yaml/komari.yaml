      Description: Detects potential file activity of Komari RMM tool
    - Sigma: https://github.com/magicsword-io/LOLRMM/blob/main/detections/sigma/komari_network_sigma.yml
      Description: Detects potential network activity of Komari RMM tool
    - Sigma: https://github.com/magicsword-io/LOLRMM/blob/main/detections/sigma/komari_processes_sigma.yml
      Description: Detects potential process activity of Komari RMM tool
    - Sigma: https://github.com/magicsword-io/LOLRMM/blob/main/detections/sigma/komari_registry_sigma.yml
      Description: Detects potential registry activity of Komari RMM tool
References:
