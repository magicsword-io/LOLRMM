  EventLog:
  - EventID: 7045
    ProviderName: Service Control Manager
    LogFile: System.evtx
    ServiceName: TiService
    ImagePath: '"C:\\Program Files (x86)\\TiFLUX\\TiService.exe"'
    Description: Service installation event as result of TiFLUX agent installation.
  - EventID: 4688
    ProviderName: Microsoft-Windows-Security-Auditing
    LogFile: Security.evtx
    CommandLine: '"cmd" /c "sc failure TiService reset= 86400 actions= restart/30000"'
    Description: Process creation observed during TiFLUX install — msiexec spawning
      cmd.exe to harden TiService auto-restart behaviour.
  - EventID: 4688
    ProviderName: Microsoft-Windows-Security-Auditing
    LogFile: Security.evtx
    CommandLine: cmd.exe /c start /MIN "" "C:\\Program Files (x86)\\TiFLUX\\si.exe"
    Description: TiService spawning the silent helper si.exe via cmd.exe with a hidden
      window.
  Registry:
  - Path: HKLM\SYSTEM\CurrentControlSet\Services\TiService
    Description: TiFLUX SYSTEM service registration
  - Path: HKLM\SYSTEM\CurrentControlSet\Services\TiService\ImagePath
    Description: ImagePath = "C:\Program Files (x86)\TiFLUX\TiService.exe"
  - Path: HKLM\SYSTEM\CurrentControlSet\Services\TiService\Start
    Description: "Start = 2 (Automatic) \u2014 service launches at boot"
  - Path: HKLM\SOFTWARE\TiFLUX\*
    Description: Tenant configuration (id, client_id, org_id, org_token, token, uuid)
  - Path: HKLM\SOFTWARE\WOW6432Node\TiFLUX\*
    Description: Tenant configuration on 32-bit-on-64 install (id, client_id, org_id,
      org_token, token, uuid)
  - Path: HKLM\SOFTWARE\WOW6432Node\TiFLUX\org_id
    Description: Tenant org_id value persisted by the agent
  - Path: HKLM\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Run\TiAgent
    Description: Run-key persistence for TiAgent.exe (per-machine autostart of the
      tray UI)
  - Path: HKCU\SOFTWARE\TiFlux
    Description: Per-user TiFLUX state
  Network:
  - Description: "TiFLUX agent control channel \u2014 websocket and equipment registration\
      \ / triggers JSON endpoints"
    Domains:
    - agent.tiflux.com
    Ports:
    - 443
  - Description: TiFLUX tenant web console
    Domains:
    - app.tiflux.com
    Ports:
    - 443
  - Description: TiFLUX corporate / marketing site (referenced from agent and installer)
    Domains:
    - tiflux.com
    - www.tiflux.com
    - tiflux.com.br
    - www.tiflux.com.br
    Ports:
    - 443
  - Description: TiFLUX per-tenant subdomains used to host the agent MSI installer
      download (also abused to deliver decoy MSIs named after legitimate software)
    Domains:
    - '*.tiflux.com'
    Ports:
    - 443
  - Description: Splashtop infrastructure referenced by the agent only when the optional
      Splashtop remote-access integration is enabled in the tenant; the Splashtop
      client itself is not bundled in the TiFLUX MSI and is installed separately
      (see splashtop.yaml for Splashtop-specific artifacts)
    Domains:
    - my.splashtop.com
    Ports:
    - 443
