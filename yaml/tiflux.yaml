Name: TiFLUX
Category: RMM
Description: 'TiFLUX (Tiflux) is a Brazilian SaaS Help Desk / Service Desk platform
  with an integrated remote monitoring and management (RMM) agent. The agent enables
  IT asset inventory, screenshot capture, in-tenant chat, command execution and remote
  access via a bundled UltraVNC stack (and an optional Splashtop integration) from
  a single web console at app.tiflux.com. The agent registers managed equipment with
  the tenant via agent.tiflux.com over HTTPS/WSS.

  Threat actors have been observed standing up TiFLUX tenants and abusing the platform''s
  MSI distribution mechanism to deliver agent installers under decoy names (Adobe
  Reader, Zoom, DocuSign, etc.) hosted on per-tenant *.tiflux.com subdomains. Once
  installed, the agent gives remote command execution as SYSTEM, persistent SYSTEM
  service (TiService), and inbound remote control via the bundled UltraVNC server.

  '
Author: '@MHaggis'
Created: '2026-05-04'
LastModified: '2026-05-04'
Details:
  Website: https://tiflux.com/
  PEMetadata:
  - Filename: TiAgent.exe
    OriginalFileName: TiAgent.exe
    Description: TiAgent (user-mode tray application that registers the equipment
      and surfaces a browser link to the tenant)
  - Filename: TiService.exe
    OriginalFileName: TiService.exe
    Description: TiFLUX Windows service running as SYSTEM (`TiService`); image path
      C:\Program Files (x86)\TiFLUX\TiService.exe
  - Filename: TiUpdateService.exe
    OriginalFileName: TiUpdateService.exe
    Description: TiFLUX agent updater binary (.NET — TiUpdateService.exe.config and
      TiUpdateService.pdb shipped alongside; not directly observed registered as
      a Windows service)
  - Filename: si.exe
    Description: TiFLUX silent helper invoked by the service via cmd.exe /c start
      /MIN
  Privileges: SYSTEM
  Free: Yes (free trial)
  Verification: Tenant signup required; corporate email accepted but not strictly
    enforced
  SupportedOS:
  - Windows
  - Linux
  - MacOS
  - Android
  Capabilities:
  - Remote monitoring and management
  - Helpdesk and ticketing (N1/N2/N3)
  - Asset inventory
  - Screenshot capture
  - In-tenant chat
  - Remote command execution
  - Remote access via bundled UltraVNC (WinVNC.exe, VNCHooks.dll, mv2.dll driver)
  - Optional Splashtop integration for remote control (Splashtop client installed separately; not bundled in TiFLUX MSI)
  - Multi-platform agent (Windows, Linux, macOS, Android RemoteAccess app)
  - Per-tenant MSI distribution from *.tiflux.com subdomains
  Vulnerabilities: []
  InstallationPaths:
  - C:\Program Files (x86)\TiFLUX\*
  - C:\Program Files (x86)\TiFLUX\desktop\*
  - C:\Program Files (x86)\TiFLUX\dependencies\*
  - C:\Program Files (x86)\TiFLUX\dependencies\7zip\*
  - C:\Program Files (x86)\TiFLUX\dependencies\tar\*
  - C:\Program Files (x86)\TiFLUX\dependencies\ultravnc\*
  - C:\Program Files (x86)\TiFLUX\TiService.exe
  - C:\Program Files (x86)\TiFLUX\TiUpdateService.exe
  - C:\Program Files (x86)\TiFLUX\si.exe
  - C:\Program Files (x86)\TiFLUX\desktop\TiAgent.exe
  - '%ProgramData%\Tiflux\*'
  - /Applications/TiAgent.app
