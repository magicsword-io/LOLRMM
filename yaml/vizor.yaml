    Website: https://www.vector-networks.com/
    PEMetadata:
        - Filename: CLBOOT32.EXE
          Description: Vector Networks LANutil32 / Vector Asset Management Client main executable (boot/launcher) — author "Vector Networks Limited", original product "LANutil32 Suite"; spawns CLDIST32.EXE, WINCHK32.EXE, lusmbios16.exe etc. during inventory collection (confirmed via VirusTotal sandbox behaviour for SHA-256 435519ff10b0cfa569296dcd5dcbf470bfe5aafbe0471fcf99015a24691c0893)
        - Filename: CLDIST32.EXE
          Description: Vector Asset Management Client distribution component (LANutil32 Distribution Agent companion binary)
        - Filename: CLDISTSVC.EXE
          Description: Windows service binary — "LANutil32 Distribution Agent" (per third-party startup-program databases) — software distribution / push deployment service hosted by the Vector Asset Management Client
        - Filename: clMeter32.exe
          Description: Vector Asset Management software-metering client (LANutil32 Meter component)
        - Filename: clMeterSvc.exe
          Description: Vector Asset Management software-metering Windows service — high-frequency active-window sampling for software usage measurement (associated with the LANutil32 Suite / Vector PC Software Metering capability)
        - Filename: HTTPGet.exe
          Description: HTTP download helper used by the Vector Asset Management Client to retrieve content (referenced in the v5.80 release notes as occasionally requesting attention after reboot on Windows Vista)
        - Filename: HTTPPush.exe
          Description: HTTP push helper used by the Vector Asset Management Client to upload inventory to the Vector Discovery Server / IIS endpoint
        - Filename: WINCHK32.EXE
          Description: Vector Asset Management Windows-side inventory collector (executes against winchk.dat data file per VirusTotal Cuckoofork observation)
        - Filename: regapps.exe
          Description: Vector Asset Management installed-applications registry collector
        - Filename: lutinfow32.exe
          Description: Vector Asset Management hardware/software info collector (LANutil32 info utility)
        - Filename: LuSMBIOS32.exe
          Description: Vector Asset Management SMBIOS interrogation utility (LANutil32 SMBIOS reader, x86 build)
        - Filename: LuLogon.exe
          Description: Vector Asset Management logon-time helper
        - Filename: LUGuard.exe
          Description: Vector Asset Management watchdog / guard utility
        - Filename: LUEDIT.EXE
          Description: Vector Asset Management editor utility
        - Filename: SelfUpdater.exe
          Description: Vector Asset Management Client self-update binary
        - Filename: VnlSelfUpdate.exe
          Description: Vector Asset Management Client self-update orchestrator (Vector Networks LAN — VNL — namespace)
        - Filename: VNLDriverInstaller.exe
          Description: Vector Asset Management driver installation helper (VNL namespace)
        - Filename: PidUpdater.exe
          Description: Vector Asset Management product-ID / inventory updater
        - Filename: cpuchk.exe
          Description: Vector Asset Management CPU detection helper
        - Filename: upload.exe
          Description: Vector Asset Management generic upload helper
        - Filename: NUKE32.EXE
          Description: Vector Asset Management cleanup/uninstall helper (LANutil32 Suite component)
        - Filename: Recycler.exe
          Description: Vector Asset Management Client recycler / queue processor
        - Filename: closeapp.exe
          Description: Vector Asset Management helper that closes running applications (e.g. before software distribution)
        - Filename: VECWAIT.EXE
          Description: Vector Asset Management wait/synchronisation helper
        - Filename: Prep64.exe
          Description: Vector Asset Management 64-bit preparation helper
        - Filename: Setup.exe
          Description: Vector Networks server-side post-install setup binary shipped in the VIZOR 2.5.2 MSI_Merge bundle (registry footprint includes HKLM\SOFTWARE\Metaquest — Metaquest is the original Vector Networks parent brand) — SHA-256 316d76102bdb089ed48188d2b95f6dbf9dc6ae070775d2b4404f486db87aa61e
        - Filename: VNConfigUtils.exe
          Description: VIZOR / Vector Networks configuration utility (referenced as a VirusTotal "referrer file" for vector-networks.com — 1-2/74 detection rate, low-prevalence Vector-authored binary)
        - Filename: MqMailIntegration.exe
          Description: VIZOR ServiceDesk mail / email-integration component (Mq prefix = MetaQuest, the original Vector Networks codebase namespace; referenced as a vector-networks.com VirusTotal "referrer file" with 1-2/74 detection rate)
    Privileges: SYSTEM (Vector Discovery Client runs as a Windows service under LocalSystem by default; client install requires Administrator privileges; running the client on an ongoing basis does not)
    Free: 14-day free trial (vizor.cloud) — paid commercial product otherwise
    Verification: Tenant signup / sales contact required; on-premise deployments require Microsoft IIS + SQL Server licensing
    SupportedOS:
        - Windows
    Capabilities:
        - IT Asset Management (ITAM), Software Asset Management (SAM), IT Service Management (ITSM)
        - Network device discovery (PC, server, router, switch, printer, SNMP devices)
        - Hardware inventory (WMI, DMI, SMBIOS, BIOS, registry interrogation)
        - Software inventory and software metering (active-window sampling every ~10s via clMeterSvc)
        - Software distribution / push deployment — "system installs standard MSIs and other installer scripts, batch files — any valid code can be executed" (per Vector Asset Management v6.0 user manual)
        - Remote client push install via ADMIN$ share + local administrative credentials (built-in deployment tooling)
        - Group Policy and OS-image-based client deployment (also documented)
        - SCCM / ConfigMgr, LanSweeper, SolarWinds and JAMF integration (asset data import / bridge)
        - Embedded HTTP/HTTPS upload to operator-configured Vector Discovery Server (default 443/HTTPS, configurable)
        - Active Directory connector — automated AD account provisioning, group membership changes, password resets, account creation/disable/delete (VIZOR ServiceDesk feature, executed server-side from the Vector Discovery Server)
        - Self-hosted on-premise OR vendor-hosted cloud (vizor.cloud) — agent endpoint is operator-configured, not a fixed vendor cloud
    Vulnerabilities: []
    InstallationPaths:
        - C:\Program Files (x86)\Vector\Asset Management Client\*
        - C:\Program Files\Vector\Asset Management Client\*
        - C:\Program Files\Vector Networks Limited\LANutil32 Suite\*
