    EventLog:
        - EventID: 7045
          ProviderName: Service Control Manager
          LogFile: System.evtx
          Description: Service installation event from the Vector Asset Management Client MSI — runs as LocalSystem by default per the VIZOR Security Topics document. The service DisplayName is documented as "Vector Asset Management Agent"; the underlying SCM service short-name (which is what 7045 events actually carry in the ServiceName field) has NOT been confirmed via MSI inspection — the public installer bundle is server-side only. Detections should match on ImagePath ending in `C:\Program Files\Vector\Asset Management Client\*.exe` rather than relying on a guessed ServiceName.
        - EventID: 7045
          ProviderName: Service Control Manager
          LogFile: System.evtx
          Description: Server-side service installation event — the Vector Scheduler Windows service (documented DisplayName) runs on the Vector Discovery Server and parses inventory uploads from the Offline Area into the SQL Server database. Documented in the VIZOR Security Topics document — runs under a Windows account chosen at install time which must have read/write access to the Offline Area and SQL access to the database. SCM short-name not confirmed via MSI inspection.
        - EventID: 11707
          ProviderName: MsiInstaller
          LogFile: Application.evtx
          Data: 'Product: Vector Asset Management Client v6.0 -- Installation completed successfully.'
          Description: MSI installer success event for the Vector Asset Management Client v6.0 — ProductCode {04821777-1FD1-4C1A-AC4D-BF5D4D53C34C}, default install dir `C:\Program Files (x86)\Vector\Asset Management Client`. ProductName text derived from the Uninstall DisplayName per advanceduninstaller.com listing, not from a directly-introspected MSI Property table.
        - EventID: 11707
          ProviderName: MsiInstaller
