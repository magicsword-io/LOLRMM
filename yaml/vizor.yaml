          Description: MSI installer success event for the Vector Asset Management Client v5.7 — ProductCode {A40A237D-C090-4C05-8580-9DBECFE3602B}, default install dir `C:\Program Files\Vector\Asset Management Client`. ProductName text derived from the Uninstall DisplayName per advanceduninstaller.com listing.
