        - 'C:\ProgramData\Teramind Agent\<version>\{6D99445F-F40F-45CB-B433-06302DAE6C70}\tmagentsvc.exe'
        - 'C:\ProgramData\Package Cache\.unverified\agent'
        - /usr/local/teramind/agent/bin/
