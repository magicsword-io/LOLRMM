          Description: Teramind installer UI helper for ARM64 Windows (signed by Teramind Inc.)
        - Filename: Teramind.Remover.Executable
          OriginalFileName: Teramind.Remover.Executable
          Description: Teramind agent removal utility (signed by Teramind Inc.)
        - Filename: teramind-remover.exe
          Description: Teramind agent removal utility variant served from teramind.co
        - Filename: Teramind.Setup.Remover.exe
          Description: Teramind agent removal utility variant served from teramind.co
        - Filename: dwm.exe
          Description: Default rename target for the Teramind Hidden Agent core executable; configurable via TMAGENTEXE installer parameter — collides intentionally with the legitimate Desktop Window Manager process name
        - Filename: clm.exe
          Description: Default rename target for the Teramind clipboard-monitor process; configurable via TMCLIPMONEXE installer parameter
        - Filename: update-shim.exe
          Description: Runtime name of Teramind.Setup.Updater.exe; downloaded from https://www.teramind.co/d/update-shim.exe
    Privileges: SYSTEM
    Free: 14 day trial; subsequent paid subscription
    Verification: Tenant signup; Stealth/Hidden agent only available to vetted customers per vendor docs
    SupportedOS:
        - Windows
        - MacOS
    Capabilities:
        - User activity monitoring (keystroke, screen, app, web)
        - Stealth / hidden agent mode (absent from Add/Remove Programs)
        - Configurable process renaming (default agent rename to dwm.exe; clipboard monitor to clm.exe)
        - Screen recording and live screen viewing
        - Audio recording (UDP, random port 1000-65535)
        - Remote command execution
        - Remote desktop / live session viewing via WebSocket on tcp/443
        - File transfer monitoring and DLP
        - Email / IM / printed document interception
        - OCR of on-screen content
        - Windows + macOS endpoint coverage from a single tenant
        - Cloud (multi-tenant SaaS) and On-Premise deployment topologies
    Vulnerabilities: []
    InstallationPaths:
        - 'C:\ProgramData\{4CEC2908-5CE4-48F0-A717-8FC833D8017A}\*'
        - 'C:\ProgramData\{4CEC2908-5CE4-48F0-A717-8FC833D8017A}\config'
        - 'C:\ProgramData\{4CEC2908-5CE4-48F0-A717-8FC833D8017A}\updates\*'
