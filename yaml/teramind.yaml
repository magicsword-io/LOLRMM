          Description: Teramind Agent Windows service binary (registered under service name tsvchst); embedded URL https://www.teramind.co/d/update-shim.exe
        - Filename: Teramind.Setup.Updater.exe
          OriginalFileName: Teramind.Setup.Updater.exe
          Description: Teramind agent updater shim; renamed to update-shim.exe at runtime; .NET assembly signed by Teramind Inc.
        - Filename: Teramind.Setup.UI.exe
          OriginalFileName: Teramind.Setup.UI.exe
          Description: Teramind installer UI helper (signed by Teramind Inc.)
        - Filename: Teramind.Setup.UIARM.exe
