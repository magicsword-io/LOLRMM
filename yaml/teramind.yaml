        - /usr/local/teramind/agent/etc/
        - /Applications/Teramind Agent.app
        - /Applications/tmagent.app
Artifacts:
    Disk:
        - File: 'C:\ProgramData\{4CEC2908-5CE4-48F0-A717-8FC833D8017A}\*'
          Description: Teramind Hidden / Stealth agent root install directory; named with a fixed product GUID. Vendor docs explicitly call this the verification path for confirming hidden-agent installation. Override via TMROOTDIR installer parameter.
          OS: Windows
        - File: 'C:\ProgramData\{4CEC2908-5CE4-48F0-A717-8FC833D8017A}\config'
          Description: Teramind Hidden agent configuration directory
          OS: Windows
        - File: 'C:\ProgramData\{4CEC2908-5CE4-48F0-A717-8FC833D8017A}\updates\rundll32.exe.config'
          Description: Teramind agent update staging artifact (.NET app.config sidecar) — directly observed as a Teramind-domain downloaded file in VirusTotal infrastructure data; the rundll32.exe filename is the renamed updater binary, not the legitimate Microsoft rundll32.
          OS: Windows
        - File: 'C:\ProgramData\Teramind Agent\*'
          Description: Teramind Revealed agent root install directory (typical install layout)
          OS: Windows
        - File: 'C:\ProgramData\Teramind Agent\config'
          Description: Teramind Revealed agent configuration directory
          OS: Windows
        - File: 'C:\ProgramData\Teramind Agent\<version>\{6D99445F-F40F-45CB-B433-06302DAE6C70}\tmagentsvc.exe'
          Description: Teramind agent Windows service binary; vendor-documented exact image path (version directory varies by release, e.g. 24.12.0). Invoked with --service / -service.
          OS: Windows
        - File: 'C:\ProgramData\Package Cache\.unverified\agent'
          Description: WiX bundle cache copy of the Teramind agent MSI; observed across multiple Teramind MSI submissions in VirusTotal infrastructure data.
          OS: Windows
        - File: teramind_agent_*_bundle_noredist_setup.msi
          Description: Teramind agent installer MSI; vendor enforces a fixed filename pattern and refuses to run if renamed. Observed signed variants include teramind_agent_v25.34.2799_bundle_noredist_setup.msi, teramind_agent_v25.31.2935_bundle_noredist_setup.msi, teramind_agent_v24.13.19_bundle_noredist_setup.msi, teramind_agent_v26.8.183_bundle_noredist_setup.msi.
          OS: Windows
        - File: teramind_agent_*_x64.msi
          Description: Teramind agent installer MSI (x64 variant) — observed naming pattern teramind_agent_x64.msi, teramind_agent_v5.0.0_x64.msi, teramind_agent_x64_s-i(__<hash>).msi where the trailing parenthesised value is the per-tenant install identifier.
          OS: Windows
        - File: teramind_agent_*_ARM64.msi
          Description: Teramind agent installer MSI (ARM64) — observed signed variants include teramind_agent_v26.8.183_ARM64.msi, teramind_agent_v26.8.183_ARM64_popup.msi, teramind_agent_v26.8.183_bundle_drivers_ARM64.msi.
          OS: Windows
        - File: 'C:\Windows\Installer\*.msi'
          Description: Cached MSI in the standard Windows Installer cache (e.g. C:\Windows\Installer\46a573.msi observed for a Teramind install); content-identical to the original teramind_agent_*.msi
          OS: Windows
        - File: tmagent-i(__<hash>).pkg
          Description: Teramind macOS agent PKG installer; vendor enforces a fixed filename pattern. Per-tenant identifier embedded as -i(__<hash>); renamed installers are rejected.
          OS: MacOS
        - File: teramind_agent_*_hidden-do(<domain>).pkg
          Description: Teramind macOS hidden-agent PKG installer with the deployment-domain installer parameter -do(<tenant>) baked into the filename, e.g. teramind_agent_v1.235.4632_hidden-do(acme.com).pkg
          OS: MacOS
        - File: /usr/local/teramind/agent/bin/tmsysd
          Description: Teramind macOS agent daemon binary
          OS: MacOS
        - File: /usr/local/teramind/agent/etc/
          Description: Teramind macOS agent configuration directory
          OS: MacOS
        - File: /Applications/Teramind Agent.app
          Description: Teramind Revealed macOS agent app bundle
          OS: MacOS
        - File: /Applications/tmagent.app
          Description: Teramind Hidden macOS agent app bundle
          OS: MacOS
        - File: tmui
          Description: Teramind Revealed-agent macOS UI component
          OS: MacOS
        - File: Teramind.Setup.Updater.exe
          Description: Teramind agent updater shim binary (.NET, signed by Teramind Inc.); contacts https://www.teramind.co/d/check?v=<version>&s=1&arch=<arch> on launch and downloads update-shim.exe from https://www.teramind.co/d/update-shim.exe
          OS: Windows
        - File: tmdiag.zip
          Description: Teramind diagnostic-bundle archive served from teramind.co; collected by the agent for vendor support
          OS: Windows
    EventLog:
        - EventID: 7045
          ProviderName: Service Control Manager
          LogFile: System.evtx
          ServiceName: tsvchst
          ImagePath: '"C:\\ProgramData\\Teramind Agent\\<version>\\{6D99445F-F40F-45CB-B433-06302DAE6C70}\\tmagentsvc.exe" --service'
          Description: Service installation event for the Teramind Agent. The service name is tsvchst (vendor-documented), but the on-disk image is tmagentsvc.exe under the Teramind ProgramData install root. Stealth installs may use the GUID-named ProgramData path C:\ProgramData\{4CEC2908-5CE4-48F0-A717-8FC833D8017A}\ instead.
        - EventID: 4697
          ProviderName: Microsoft-Windows-Security-Auditing
          LogFile: Security.evtx
          ServiceName: tsvchst
          CommandLine: '"C:\\ProgramData\\Teramind Agent\\<version>\\{6D99445F-F40F-45CB-B433-06302DAE6C70}\\tmagentsvc.exe" --service'
          Description: Service installation event (security auditing variant) for tsvchst / tmagentsvc.exe.
        - EventID: 4688
          ProviderName: Microsoft-Windows-Security-Auditing
          LogFile: Security.evtx
          CommandLine: 'msiexec.exe /i teramind_agent_*_bundle_noredist_setup.msi'
          Description: Process creation observed at install time — msiexec invoking a Teramind agent MSI by its fixed filename pattern. The vendor's installer enforces that the MSI must not be renamed.
    Registry:
        - Path: HKLM\SYSTEM\CurrentControlSet\Services\tsvchst
          Description: Teramind agent Windows service registration (service name = tsvchst)
        - Path: HKLM\SYSTEM\CurrentControlSet\Services\tsvchst\ImagePath
          Description: 'ImagePath = "C:\ProgramData\Teramind Agent\<version>\{6D99445F-F40F-45CB-B433-06302DAE6C70}\tmagentsvc.exe" --service (or equivalent path under the GUID-named hidden-agent root)'
        - Path: HKLM\SYSTEM\CurrentControlSet\Services\tsvchst\Start
          Description: Start = 2 (Automatic) — service launches at boot
    Network:
        - Description: Teramind cloud tenant base domain — wildcard *.teramind.co covers per-tenant subdomains (e.g. acme.teramind.co) used for the agent control channel and the customer web console. Backed by Cloudflare (104.20.25.93, 172.66.155.133). The Teramind agent installer also enforces the deployment-domain via the -do(<domain>) parameter, baking the tenant subdomain into the installer filename.
          Domains:
              - '*.teramind.co'
              - teramind.co
              - www.teramind.co
          Ports:
              - 443
        - Description: Teramind cloud realtime / WebSocket endpoint — async video upload, live screen, and offline video upload traffic over wss://. Vendor-documented hostname.
          Domains:
              - rt.teramind.co
          Ports:
              - 443
        - Description: Teramind agent update / version check endpoint — directly observed as the in-the-wild URL contacted by Teramind.Setup.Updater.exe on launch (https://www.teramind.co/d/check?v=<version>&s=1&arch=<arch>) and as the download URL for the updater shim (https://www.teramind.co/d/update-shim.exe).
          Domains:
              - www.teramind.co
          Ports:
              - 443
        - Description: Teramind Sentry telemetry endpoint embedded in signed Teramind binaries; used for crash / error reporting back to Teramind.
          Domains:
              - sentry.dev.teramind.co
          Ports:
              - 443
        - Description: Teramind Master Server proprietary TLS protocol (on-premise deployments only). Used for agent ↔ Master Server control plane.
          Domains:
              - <on-prem-master-server-host>
          Ports:
              - 10000
        - Description: Teramind App Server traffic in multi-node on-premise deployments. Vendor-documented TCP port range.
          Domains:
              - <on-prem-app-server-host>
          Ports:
              - 10000
              - 10001
              - 10500
              - 11000
        - Description: Teramind agent audio recording transport. Vendor-documented UDP, random port from a wide range; tenants commonly punch the entire 1000-65535 range in firewalls.
          Domains:
              - '*.teramind.co'
          Ports:
              - 1000-65535
        - Description: Teramind agent deployment / update fetch over plaintext HTTP. Vendor-documented as port 80 for agent deployment / update transport.
          Domains:
              - www.teramind.co
          Ports:
              - 80
